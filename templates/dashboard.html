{% extends "base.html" %}
{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap');

* {
    margin: 0 !important;
    padding: 0 !important;
    box-sizing: border-box !important;
}

html, body {
    font-family: 'Montserrat', sans-serif !important;
    background: #0a0e27 !important;
    color: #ffffff !important;
    min-height: 100vh !important;
    overflow-x: hidden !important;
}

/* Container */
.dashboard-container{
    padding: 30px 20px !important;
    max-width: 100% !important;
    margin: 0 auto !important;
    background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%) !important;
}

/* Page Title */
.page-title{
    text-align: center !important;
    font-size: 32px !important;
    font-weight: 900 !important;
    margin-bottom: 25px !important;
    color: #fff !important;
    background: linear-gradient(120deg, #00d4ff, #0099ff, #6633ff) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
    letter-spacing: -1px !important;
    text-transform: uppercase !important;
    filter: drop-shadow(0 10px 30px rgba(0, 212, 255, 0.3)) !important;
}

/* Tabs Container */
.tabs{
    display: flex !important;
    justify-content: center !important;
    gap: 12px !important;
    flex-wrap: wrap !important;
    margin-bottom: 25px !important;
    background: linear-gradient(135deg, rgba(25, 118, 210, 0.1) 0%, rgba(156, 39, 176, 0.1) 100%) !important;
    padding: 15px 20px !important;
    border-radius: 20px !important;
    border: 2px solid rgba(0, 212, 255, 0.2) !important;
    backdrop-filter: blur(20px) !important;
}

.tab-btn{
    padding: 11px 24px !important;
    border-radius: 12px !important;
    border: 2px solid rgba(0, 212, 255, 0.4) !important;
    cursor: pointer !important;
    font-weight: 700 !important;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(102, 51, 255, 0.1)) !important;
    color: #00d4ff !important;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    font-size: 12px !important;
    text-transform: uppercase !important;
    letter-spacing: 1px !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3) !important;
}

.tab-btn:hover{
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(102, 51, 255, 0.2)) !important;
    transform: translateY(-3px) scale(1.03) !important;
    box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4) !important;
    border-color: rgba(0, 212, 255, 0.8) !important;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.6) !important;
}

.tab-btn.active{
    background: linear-gradient(135deg, #00d4ff, #0099ff) !important;
    color: #0a0e27 !important;
    box-shadow: 0 12px 40px rgba(0, 212, 255, 0.5) !important;
    border-color: #00d4ff !important;
    font-weight: 900 !important;
    text-shadow: none !important;
}

/* Dashboard Glass Box */
.dash{
    display: none !important;
    animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
}

.active-dash{
    display: block !important;
}

iframe{
    width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9 !important;
    min-height: 400px !important;
    border-radius: 15px !important;
    border: 2px solid rgba(0, 212, 255, 0.3) !important;
    box-shadow: 0 20px 50px rgba(0, 212, 255, 0.2), inset 0 0 40px rgba(102, 51, 255, 0.1) !important;
    background: #1a1f3a !important;
    backdrop-filter: blur(10px) !important;
}

/* Animation */
@keyframes popIn {
    0% {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
    }
    50% {
        opacity: 0.8;
    }
    100% {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

/* Responsive */
@media(max-width:1024px){
    .dashboard-container {
        padding: 60px 30px !important;
    }
    
    .page-title {
        font-size: 42px !important;
        margin-bottom: 60px !important;
    }
    
    .tabs {
        padding: 25px 30px !important;
        gap: 15px !important;
    }
    
    .tab-btn {
        padding: 14px 32px !important;
        font-size: 13px !important;
    }
}

@media(max-width:768px){
    .dashboard-container {
        padding: 40px 20px !important;
    }
    
    .page-title {
        font-size: 32px !important;
        margin-bottom: 40px !important;
    }
    
    .tabs {
        padding: 20px !important;
        gap: 10px !important;
        flex-direction: column !important;
    }
    
    .tab-btn {
        padding: 12px 24px !important;
        font-size: 12px !important;
        width: 100% !important;
    }
    
    iframe {
        height: 600px !important;
    }
}
</style>

<div class="dashboard-container">

    <h2 class="page-title">Interactive Heart Disease Dashboards</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="showDash('d1', this)">Demographic Analysis</button>
        <button class="tab-btn" onclick="showDash('d2', this)">Lifestyle Factors</button>
        <button class="tab-btn" onclick="showDash('d3', this)">Medical Conditions</button>
    </div>

    <!-- Demographic -->
   <div id="d1" class="dash active-dash">

    <iframe 
    src="https://public.tableau.com/views/Book1_17729645194770/Sheet1?:showVizHome=no&:embed=true"
    frameborder="0"
    allowfullscreen="">
    </iframe>

    <iframe 
    src="https://public.tableau.com/views/Book1_17729644084610/Sheet2?:showVizHome=no&:embed=true"
    frameborder="0"
    allowfullscreen="">
    </iframe>

</div>

    <!-- Lifestyle -->
    <div id="d2" class="dash">
        <iframe 
        src="https://public.tableau.com/views/PallaviSingh_17729664375520/LifestyleRiskFactors2?:showVizHome=no&:embed=true"
        frameborder="0"
        allowfullscreen="">
        </iframe>
    </div>

    <!-- Medical -->
    <div id="d3" class="dash">
        <iframe 
        src="https://public.tableau.com/views/Book3_17729665305120/MedicalConditionsAnalysis2?:showVizHome=no&:embed=true"
        frameborder="0"
        allowfullscreen="">
        </iframe>
    </div>

</div>

<script>
function showDash(id, btn) {
    document.querySelectorAll('.dash').forEach(d => d.classList.remove('active-dash'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    document.getElementById(id).classList.add('active-dash');
    btn.classList.add('active');
}
</script>

{% endblock %}
